<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sleep Outside | Checkout</title>
  <link rel="stylesheet" href="/css/style.css" />
  <script src="../js/checkout.js" type="module"></script>
</head>

<body>
  <header class="divider" id="main-header"></header>

  <main class="divider">
    <section class="products">
      <h2>Review & Place your Order</h2>

      <div class="checkout-container">
        <form id="checkout-form" onsubmit="return false;">
          <fieldset>
            <legend>Shipping Address</legend>
            <label>First Name: <input type="text" name="fname" required></label>
            <label>Last Name: <input type="text" name="lname" required></label>
            <label>Street: <input type="text" name="street" required></label>
            <label>City: <input type="text" name="city" required></label>
            <label>State: <input type="text" name="state" required></label>
            <label>Zip Code: <input type="text" id="zip" name="zip" required></label>
          </fieldset>

          <fieldset>
            <fieldset>
              <legend>Payment</legend>
              <label>Card Number: <input type="text" name="cardNumber" value="1234123412341234" required></label>
              <label>Expiration Date: <input type="text" name="expiration" placeholder="MM/YY" required></label>
              <label>Security Code: <input type="text" name="code" value="123" required></label>
            </fieldset>
          </fieldset>

          <button type="submit" id="checkout-submit">Checkout</button>
        </form>

        <fieldset class="order-summary">
          <legend>Order Summary</legend>
          <ul>
            <li>Subtotal: <span id="subtotal">$0.00</span></li>
            <li>Shipping Estimate: <span id="shipping">$0.00</span></li>
            <li>Tax (6%): <span id="tax">$0.00</span></li>
            <li><strong>Order Total: <span id="order-total">$0.00</span></strong></li>
          </ul>
        </fieldset>
      </div>
    </section>
  </main>

  <footer id="main-footer"></footer>
</body>

</html>
